<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szelektív hulladék játék</title>
    <link rel="stylesheet" href="szelektiv.css">
</head>
<body>
    <div id="gameArea">
        <div id="trash" draggable="true"></div>
        <div class="bins">
            <div class="bin" data-type="paper">
                <span>Papír</span>
                <div class="count">0</div>
            </div>
            <div class="bin" data-type="plastic">
                <span>Műanyag</span>
                <div class="count">0</div>
            </div>
            <div class="bin" data-type="metal">
                <span>Fém</span>
                <div class="count">0</div>
            </div>
            <div class="bin" data-type="mixed">
                <span>Vegyes</span>
                <div class="count">0</div>
            </div>
        </div>
        <div id="feedback" class="feedback"></div>
    </div>
    <div id="info">
        <div>Pontszám: <span id="score">0</span></div>
        <div>Hibák száma: <span id="errors">0</span></div>
        <div>Idő: <span id="time">60</span>s</div>
    </div>
    <script src="szelektiv.js"></script>

</body>
</html>
